<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>RC Logo Maker – Éditeur</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;700;900&family=Bebas+Neue&family=Righteous&family=Oswald:wght@500;700&family=Roboto:wght@400;900&family=League+Spartan:wght@700;900&family=Caveat:wght@700&family=Inter:wght@400;600;700;900&family=Pacifico&family=Abril+Fatface&family=Alfa+Slab+One&family=Lobster&family=Fjalla+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg:#0a0a0f;--panel:#12121a;--panel2:#16161f;--border:#1e1e2b;
            --text:#e8e8ee;--text2:#8a8a9a;--text3:#555566;
            --accent:#5b6af0;--accent2:#7c4af0;--danger:#ef4444;
            --radius:8px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;background:var(--bg);color:var(--text);font-family:'Inter','DM Sans',sans-serif;user-select:none;-webkit-user-select:none;touch-action:pan-x pan-y}
        #app{display:flex;flex-direction:column;height:100%}
        #topbar{height:46px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;z-index:100}
        .brand{font-weight:800;font-size:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;white-space:nowrap}
        .spacer{flex:1}
        .tbtn{padding:5px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:10px;font-family:inherit;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
        .tbtn:hover{background:var(--panel2);color:var(--text);border-color:var(--accent)}
        .tbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
        #main{display:flex;flex:1;overflow:hidden}
        #sidebar{width:50px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:4px 0;gap:2px;flex-shrink:0;overflow-y:auto}
        .stool{width:40px;min-height:40px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:7px;font-family:inherit;transition:all .15s;flex-shrink:0}
        .stool:hover{background:var(--panel2);color:var(--text);border-color:var(--border)}
        .stool svg{width:15px;height:15px}
        .sep{width:24px;height:1px;background:var(--border);margin:2px 0;flex-shrink:0}
        #flyout{width:0;background:var(--panel2);border-right:1px solid var(--border);overflow:hidden;transition:width .2s;flex-shrink:0;display:flex;flex-direction:column}
        #flyout.open{width:220px}
        .fly-inner{width:220px;height:100%;overflow-y:auto;padding:10px}
        .fly-title{font-weight:700;font-size:11px;margin-bottom:8px;text-transform:uppercase}
        .shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
        .shape-item{aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s;font-size:18px}
        .shape-item:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,106,240,0.1)}
        #canvas-area{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1c1c24;background-image:radial-gradient(circle,#2a2a35 1px,transparent 1px);background-size:20px 20px}
        #canvas-wrap{position:relative;transform-origin:center}
        #main-canvas{display:block;box-shadow:0 8px 60px rgba(0,0,0,0.8);border-radius:2px;cursor:crosshair;touch-action:none}
        #sel-canvas{position:absolute;top:0;left:0;pointer-events:none}
        #panel{width:200px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .ptabs{display:flex;border-bottom:1px solid var(--border)}
        .ptab{flex:1;padding:7px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:9px;font-family:inherit;text-transform:uppercase;border-bottom:2px solid transparent}
        .ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .pbody{flex:1;overflow-y:auto;padding:8px}
        .pgroup{margin-bottom:10px}
        .plabel{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
        .prow{display:flex;align-items:center;gap:4px;margin-bottom:4px}
        .pinp{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:10px;min-width:0}
        .pinp:focus{outline:none;border-color:var(--accent)}
        .pinp[type="color"]{padding:2px;height:26px;cursor:pointer;width:34px;flex:0 0 auto}
        .psel{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:10px;cursor:pointer}
        .pslider{flex:1;-webkit-appearance:none;height:3px;background:var(--panel2);border-radius:2px;outline:none}
        .pslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
        .pval{min-width:24px;text-align:right;color:var(--text2);font-size:9px}
        .pbtn{padding:4px 7px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:9px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:2px}
        .pbtn:hover{background:rgba(91,106,240,0.15);border-color:var(--accent);color:var(--accent)}
        .btn-row{display:flex;gap:3px}
        .no-sel{text-align:center;color:var(--text3);padding:20px;font-size:10px}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 18px;border-radius:20px;font-weight:600;font-size:0.75rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        .ctx-bar{display:none;position:fixed;top:55px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:25px;padding:5px 10px;gap:3px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
        .ctx-bar.active{display:flex}
        .ctx-bar button{width:30px;height:30px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s}
        .ctx-bar button:hover{background:var(--panel2);color:var(--text)}
        .ctx-bar button.danger:hover{background:rgba(239,68,68,0.15);color:var(--danger)}
        @media(max-width:768px){#panel{width:150px}#flyout.open{width:180px}.fly-inner{width:180px}.tbtn{font-size:9px;padding:4px 6px}}
    </style>
</head>
<body>
<div id="app">
    <div id="topbar">
        <span class="brand" onclick="goHome()">← RC Logo Maker</span>
        <div class="spacer"></div>
        <button class="tbtn" onclick="undo()">↩</button>
        <button class="tbtn" onclick="redo()">↪</button>
        <button class="tbtn" onclick="duplicateSelected()">📋</button>
        <button class="tbtn" onclick="deleteSelected()">🗑️</button>
        <button class="tbtn primary" onclick="exportPNG()">📥 Exporter</button>
    </div>
    <div id="main">
        <div id="sidebar">
            <button class="stool" onclick="toggleFlyout('shapes')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="14" height="10" rx="2"/></svg></button>
            <button class="stool" onclick="toggleFlyout('text')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h12M10 5v12"/></svg></button>
            <button class="stool" onclick="toggleFlyout('icons')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2l2 5h5l-4 3 1 5-4-3-4 3 1-5-4-3h5z"/></svg></button>
            <button class="stool" onclick="toggleFlyout('colors')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg></button>
            <button class="stool" onclick="toggleFlyout('bg')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="16" height="16" rx="2"/></svg></button>
            <div class="sep"></div>
            <button class="stool" onclick="addRect()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="14" height="10" rx="2"/></svg></button>
            <button class="stool" onclick="addCircle()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg></button>
            <button class="stool" onclick="addTriangle()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4l7 12H3z"/></svg></button>
            <button class="stool" onclick="addStar()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="10,2 13,9 20,9 15,14 17,21 10,17 3,21 5,14 0,9 7,9"/></svg></button>
            <button class="stool" onclick="addText('MON LOGO')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5h10M10 5v12"/></svg></button>
        </div>
        <div id="flyout"><div class="fly-inner" id="flyout-content"></div></div>
        <div id="canvas-area">
            <div id="canvas-wrap">
                <canvas id="main-canvas" width="500" height="500"></canvas>
                <canvas id="sel-canvas" width="500" height="500"></canvas>
            </div>
        </div>
        <div id="panel">
            <div class="ptabs">
                <button class="ptab active" onclick="switchTab('props')">Propriétés</button>
                <button class="ptab" onclick="switchTab('layers')">Calques</button>
                <button class="ptab" onclick="switchTab('canvas')">Canevas</button>
            </div>
            <div class="pbody">
                <div class="tab-content active" id="tab-props"></div>
                <div class="tab-content" id="tab-layers"></div>
                <div class="tab-content" id="tab-canvas"></div>
            </div>
        </div>
    </div>
    <div class="ctx-bar" id="ctx-bar">
        <button onclick="changeFill()" title="Couleur">🎨</button>
        <button onclick="addShadow()" title="Ombre">🕶️</button>
        <button onclick="addGlow()" title="Lueur">✨</button>
        <button onclick="addOutline()" title="Contour">✏️</button>
        <button onclick="changeOpacity()" title="Opacité">💧</button>
        <button onclick="bringForward()" title="Avant">⬆️</button>
        <button onclick="sendBackward()" title="Arrière">⬇️</button>
        <button onclick="duplicateSelected()" title="Dupliquer">📋</button>
        <button class="danger" onclick="deleteSelected()" title="Supprimer">🗑️</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════ STATE ═══════════
const canvas=document.getElementById('main-canvas'),ctx=canvas.getContext('2d');
const selCanvas=document.getElementById('sel-canvas'),selCtx=selCanvas.getContext('2d');
const FONTS=['Montserrat','Playfair Display','Poppins','Bebas Neue','Righteous','Oswald','Roboto','League Spartan','Caveat','Inter','Pacifico','Abril Fatface','Alfa Slab One','Lobster','Fjalla One','DM Sans'];
const COLORS=['#ffffff','#000000','#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#5b6af0','#7c4af0','#43e97b','#f0932b','#e11d48','#78716c'];
const ICONS=['★','♦','♠','♥','♣','◆','▲','▼','●','■','⬟','⬡','⌂','✈','⚡','✦','❋','✿','❀','✺','☀','☁','❄','♺','⚙','✉','☎','⚑','♫','✂','❤','🔥','💎','🎯','🚀','⭐','🌈','🍀','🕊️','🎨'];
const SIZES=[[500,500,'Carré'],[600,600,'Logo'],[800,400,'Bannière'],[400,800,'Portrait'],[1024,512,'Twitter'],[800,800,'Instagram']];
let elements=[],selectedId=null,history=[],historyIndex=-1,zoom=1,canvasW=500,canvasH=500,canvasBg='#ffffff',lastId=0,currentFlyout=null,activeTab='props';
let dragEl=null,dragOffX=0,dragOffY=0,resizeDir=null,resizeOrig=null,isDragging=false,isResizing=false;

function mkId(){return++lastId}
function makeRect(x,y,w,h){return{id:mkId(),type:'rect',x,y,w,h,fill:'#5b6af0',stroke:'none',strokeW:0,rx:0,opacity:1,rotation:0,visible:true,shadow:null,glow:null}}
function makeCircle(x,y,r){return{id:mkId(),type:'circle',x,y,r,fill:'#7c4af0',stroke:'none',strokeW:0,opacity:1,rotation:0,visible:true,shadow:null,glow:null}}
function makeTriangle(x,y,s){return{id:mkId(),type:'triangle',x,y,size:s,fill:'#43e97b',opacity:1,rotation:0,visible:true,shadow:null,glow:null}}
function makeStar(x,y,outerR,innerR,pts){return{id:mkId(),type:'star',x,y,outerR,innerR,points:pts,fill:'#f59e0b',opacity:1,rotation:0,visible:true,shadow:null,glow:null}}
function makeLine(x1,y1,x2,y2){return{id:mkId(),type:'line',x1,y1,x2,y2,stroke:'#ffffff',strokeW:3,opacity:1,visible:true}}
function makeText(x,y,t){return{id:mkId(),type:'text',x,y,text:t,font:'Montserrat',fontSize:40,weight:'900',fill:'#ffffff',align:'center',opacity:1,rotation:0,visible:true,letterSpacing:0,lineHeight:1.2,shadow:null,glow:null}}
function makeIcon(x,y,c,s){return{id:mkId(),type:'icon',x,y,char:c,size:s||60,fill:'#ffffff',opacity:1,rotation:0,visible:true,shadow:null,glow:null}}

function saveHistory(){history=history.slice(0,historyIndex+1);history.push(JSON.stringify(elements));historyIndex++;if(history.length>40){history.shift();historyIndex--}}
function undo(){if(historyIndex<=0)return;historyIndex--;elements=JSON.parse(history[historyIndex]);selectedId=null;render();renderProps();renderLayers();toast('↩ Annulé')}
function redo(){if(historyIndex>=history.length-1)return;historyIndex++;elements=JSON.parse(history[historyIndex]);selectedId=null;render();renderProps();renderLayers();toast('↪ Rétabli')}

// ═══════════ CLAUDE : getPos ═══════════
function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(clientX-rect.left)/zoom,y:(clientY-rect.top)/zoom};
}

// ═══════════ CLAUDE : getBB ═══════════
function getBB(el){
    switch(el.type){
        case'rect':return{x:el.x,y:el.y,w:el.w,h:el.h};
        case'circle':return{x:el.x-el.r,y:el.y-el.r,w:el.r*2,h:el.r*2};
        case'triangle':return{x:el.x-el.size/2,y:el.y-el.size/2,w:el.size,h:el.size};
        case'star':return{x:el.x-el.outerR,y:el.y-el.outerR,w:el.outerR*2,h:el.outerR*2};
        case'polygon':return{x:el.x-el.size,y:el.y-el.size,w:el.size*2,h:el.size*2};
        case'heart':return{x:el.x-el.size/2,y:el.y-el.size/2,w:el.size,h:el.size};
        case'line':{const mx=Math.min(el.x1,el.x2),my=Math.min(el.y1,el.y2);return{x:mx,y:my,w:Math.abs(el.x2-el.x1)||4,h:Math.abs(el.y2-el.y1)||4}}
        case'text':{ctx.font=`${el.style||'normal'} ${el.weight||'400'} ${el.fontSize||el.size||40}px "${el.font}"`;const w=ctx.measureText(el.text).width;return{x:el.x-w/2,y:el.y,w,h:(el.fontSize||el.size||40)}}
        case'icon':return{x:el.x-el.size/2,y:el.y-el.size/2,w:el.size,h:el.size};
        default:return{x:el.x-25,y:el.y-25,w:50,h:50};
    }
}

// ═══════════ CLAUDE : getResizeHandle ═══════════
function getResizeHandle(pos,el){
    const bb=getBB(el);const hs=8/zoom;
    const handles={nw:{x:bb.x-hs/2,y:bb.y-hs/2},n:{x:bb.x+bb.w/2-hs/2,y:bb.y-hs/2},ne:{x:bb.x+bb.w-hs/2,y:bb.y-hs/2},w:{x:bb.x-hs/2,y:bb.y+bb.h/2-hs/2},e:{x:bb.x+bb.w-hs/2,y:bb.y+bb.h/2-hs/2},sw:{x:bb.x-hs/2,y:bb.y+bb.h-hs/2},s:{x:bb.x+bb.w/2-hs/2,y:bb.y+bb.h-hs/2},se:{x:bb.x+bb.w-hs/2,y:bb.y+bb.h-hs/2}};
    for(let[h,hp]of Object.entries(handles)){if(pos.x>=hp.x&&pos.x<=hp.x+hs&&pos.y>=hp.y&&pos.y<=hp.y+hs)return h;}
    return null;
}

// ═══════════ CLAUDE : isPointInElement ═══════════
function isPointInElement(pos,el){const bb=getBB(el);return pos.x>=bb.x&&pos.x<=bb.x+bb.w&&pos.y>=bb.y&&pos.y<=bb.y+bb.h;}

// ═══════════ CLAUDE : findElementAtPos ═══════════
function findElementAtPos(pos){for(let i=elements.length-1;i>=0;i--){if(elements[i].visible!==false&&isPointInElement(pos,elements[i]))return elements[i];}return null;}

// ═══════════ CLAUDE : resizeElement ═══════════
function resizeElement(el,handle,dx,dy){
    const bb=getBB(el);let nx=el.x,ny=el.y,nw=bb.w,nh=bb.h;
    switch(handle){
        case'se':nw=Math.max(20,bb.w+dx);nh=Math.max(20,bb.h+dy);break;
        case'e':nw=Math.max(20,bb.w+dx);break;
        case's':nh=Math.max(20,bb.h+dy);break;
        case'sw':nw=Math.max(20,bb.w-dx);nh=Math.max(20,bb.h+dy);nx=el.x+bb.w-nw;break;
        case'nw':nw=Math.max(20,bb.w-dx);nh=Math.max(20,bb.h-dy);nx=el.x+bb.w-nw;ny=el.y+bb.h-nh;break;
        case'ne':nw=Math.max(20,bb.w+dx);nh=Math.max(20,bb.h-dy);ny=el.y+bb.h-nh;break;
        case'w':nw=Math.max(20,bb.w-dx);nx=el.x+bb.w-nw;break;
        case'n':nh=Math.max(20,bb.h-dy);ny=el.y+bb.h-nh;break;
    }
    if(nx<0){nw+=nx;nx=0;}if(ny<0){nh+=ny;ny=0;}if(nx+nw>canvasW)nw=canvasW-nx;if(ny+nh>canvasH)nh=canvasH-ny;
    const sx=nw/bb.w,sy=nh/bb.h;
    switch(el.type){
        case'rect':el.x=nx;el.y=ny;el.w=nw;el.h=nh;break;
        case'circle':{const nr=Math.min(nw,nh)/2;el.x=nx+nw/2;el.y=ny+nh/2;el.r=nr;break;}
        case'text':el.x=nx;el.y=ny;const fs=el.fontSize||el.size||40;el.fontSize=Math.max(8,fs*Math.min(sx,sy));el.size=el.fontSize;break;
        default:el.x=nx;el.y=ny;if(el.size)el.size=Math.max(20,el.size*Math.min(sx,sy));if(el.outerR)el.outerR=Math.max(15,el.outerR*Math.min(sx,sy));break;
    }
    render();renderProps();
}

// ═══════════ CLAUDE : drawSelection ═══════════
function drawSelection(){
    selCtx.clearRect(0,0,canvasW,canvasH);if(selectedId===null)return;const el=elements.find(e=>e.id===selectedId);if(!el)return;const bb=getBB(el);if(!bb)return;
    selCtx.strokeStyle='#5b6af0';selCtx.lineWidth=2;selCtx.setLineDash([5,3]);selCtx.strokeRect(bb.x,bb.y,bb.w,bb.h);selCtx.setLineDash([]);
    const hs=8;const handles=[{x:bb.x,y:bb.y},{x:bb.x+bb.w/2,y:bb.y},{x:bb.x+bb.w,y:bb.y},{x:bb.x,y:bb.y+bb.h/2},{x:bb.x+bb.w,y:bb.y+bb.h/2},{x:bb.x,y:bb.y+bb.h},{x:bb.x+bb.w/2,y:bb.y+bb.h},{x:bb.x+bb.w,y:bb.y+bb.h}];
    handles.forEach(h=>{selCtx.fillStyle='#fff';selCtx.fillRect(h.x-hs/2,h.y-hs/2,hs,hs);selCtx.strokeStyle='#5b6af0';selCtx.lineWidth=1.5;selCtx.strokeRect(h.x-hs/2,h.y-hs/2,hs,hs);});
}

// ═══════════ EVENT LISTENERS ═══════════
canvas.addEventListener('pointerdown',function(e){e.preventDefault();const pos=getPos(e);
    if(selectedId!==null){const el=elements.find(e2=>e2.id===selectedId);if(el){resizeDir=getResizeHandle(pos,el);if(resizeDir){isResizing=true;resizeOrig=JSON.parse(JSON.stringify(el));dragOffX=pos.x;dragOffY=pos.y;canvas.setPointerCapture(e.pointerId);return}}}
    const hit=findElementAtPos(pos);
    if(hit){selectedId=hit.id;isDragging=true;dragOffX=pos.x-hit.x;dragOffY=pos.y-hit.y;canvas.setPointerCapture(e.pointerId);showCtx()}else{selectedId=null;isDragging=false;hideCtx()}render();renderProps();renderLayers()});

canvas.addEventListener('pointermove',function(e){if(!isDragging&&!isResizing)return;e.preventDefault();const pos=getPos(e);
    if(isResizing&&selectedId!==null){const el=elements.find(e2=>e2.id===selectedId);if(el){const dx=pos.x-dragOffX,dy=pos.y-dragOffY;resizeElement(el,resizeDir,dx,dy);dragOffX=pos.x;dragOffY=pos.y;render();renderProps()}return}
    if(isDragging&&selectedId!==null){requestAnimationFrame(()=>{const el=elements.find(e2=>e2.id===selectedId);if(el){el.x=pos.x-dragOffX;el.y=pos.y-dragOffY;render()}})}});

canvas.addEventListener('pointerup',function(){if(isDragging||isResizing)saveHistory();isDragging=false;isResizing=false;resizeDir=null;resizeOrig=null;renderProps()});

canvas.addEventListener('dblclick',function(e){const pos=getPos(e);const hit=findElementAtPos(pos);if(hit&&hit.type==='text'){const t=prompt('Modifier le texte:',hit.text);if(t!==null){hit.text=t;saveHistory();render();renderProps()}}});

// ═══════════ RENDER ═══════════
function render(){
    ctx.clearRect(0,0,canvasW,canvasH);ctx.fillStyle=canvasBg;ctx.fillRect(0,0,canvasW,canvasH);
    elements.filter(e=>e.visible!==false).forEach(e=>{
        ctx.save();ctx.globalAlpha=e.opacity??1;
        if(e.shadow){ctx.shadowColor=e.shadow.color||'rgba(0,0,0,0.3)';ctx.shadowBlur=e.shadow.blur||10;ctx.shadowOffsetX=e.shadow.x||3;ctx.shadowOffsetY=e.shadow.y||3}
        if(e.glow){ctx.shadowColor=e.glow.color||'rgba(91,106,240,0.6)';ctx.shadowBlur=e.glow.blur||15;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0}
        if(e.type==='rect'){ctx.fillStyle=e.fill;if(e.rx>0){ctx.beginPath();roundRect(ctx,e.x,e.y,e.w,e.h,e.rx);ctx.fill()}else ctx.fillRect(e.x,e.y,e.w,e.h);if(e.stroke!=='none'&&e.strokeW>0){ctx.strokeStyle=e.stroke;ctx.lineWidth=e.strokeW;if(e.rx>0){ctx.beginPath();roundRect(ctx,e.x,e.y,e.w,e.h,e.rx);ctx.stroke()}else ctx.strokeRect(e.x,e.y,e.w,e.h)}}
        else if(e.type==='circle'){ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fillStyle=e.fill;ctx.fill();if(e.stroke!=='none'&&e.strokeW>0){ctx.strokeStyle=e.stroke;ctx.lineWidth=e.strokeW;ctx.stroke()}}
        else if(e.type==='triangle'){const s=e.size;ctx.beginPath();ctx.moveTo(e.x,e.y-s/2);ctx.lineTo(e.x+s/2,e.y+s/2);ctx.lineTo(e.x-s/2,e.y+s/2);ctx.closePath();ctx.fillStyle=e.fill;ctx.fill()}
        else if(e.type==='star'){ctx.beginPath();for(let i=0;i<e.points*2;i++){const a=(i/(e.points*2))*Math.PI*2-Math.PI/2;const r=i%2===0?e.outerR:e.innerR;const px=e.x+r*Math.cos(a),py=e.y+r*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.fillStyle=e.fill;ctx.fill()}
        else if(e.type==='polygon'){ctx.beginPath();for(let i=0;i<e.sides;i++){const a=(i/e.sides)*Math.PI*2-Math.PI/2;const px=e.x+e.size*Math.cos(a),py=e.y+e.size*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.fillStyle=e.fill;ctx.fill()}
        else if(e.type==='heart'){ctx.save();ctx.translate(e.x,e.y);ctx.scale(e.size/180,e.size/180);ctx.fillStyle=e.fill;ctx.beginPath();ctx.moveTo(0,-30);ctx.bezierCurveTo(-50,-80,-80,-20,0,50);ctx.bezierCurveTo(80,-20,50,-80,0,-30);ctx.fill();ctx.restore()}
        else if(e.type==='line'){ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.lineTo(e.x2,e.y2);ctx.strokeStyle=e.stroke;ctx.lineWidth=e.strokeW;ctx.stroke()}
        else if(e.type==='text'){ctx.font=`${e.style||'normal'} ${e.weight||'400'} ${e.fontSize||e.size||40}px "${e.font}"`;ctx.textAlign=e.align||'center';ctx.textBaseline='top';if(e.letterSpacing)ctx.letterSpacing=e.letterSpacing+'px';ctx.fillStyle=e.fill;const lines=e.text.split('\n');lines.forEach((l,i)=>{ctx.fillText(l,e.x,e.y+i*(e.fontSize||e.size||40)*(e.lineHeight||1.2))});ctx.letterSpacing='0px'}
        else if(e.type==='icon'){ctx.font=`${e.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=e.fill;ctx.fillText(e.char,e.x,e.y)}
        ctx.restore();
    });
    drawSelection();
}
function roundRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath()}

function exportPNG(){selectedId=null;render();const a=document.createElement('a');a.download='logo-rc-maker.png';a.href=canvas.toDataURL('image/png');a.click();toast('PNG exporté')}
function exportPNG2x(){selectedId=null;render();const c2=document.createElement('canvas');c2.width=canvasW*2;c2.height=canvasH*2;const c2ctx=c2.getContext('2d');c2ctx.scale(2,2);c2ctx.fillStyle=canvasBg;c2ctx.fillRect(0,0,canvasW,canvasH);elements.filter(e=>e.visible!==false).forEach(e=>drawElement(c2ctx,e));const a=document.createElement('a');a.download='logo-rc-maker@2x.png';a.href=c2.toDataURL('image/png');a.click();toast('PNG @2x exporté')}
function drawElement(c,el){c.save();c.globalAlpha=el.opacity??1;if(el.type==='rect'){c.fillStyle=el.fill;if(el.rx>0){c.beginPath();roundRect(c,el.x,el.y,el.w,el.h,el.rx);c.fill()}else c.fillRect(el.x,el.y,el.w,el.h)}else if(el.type==='circle'){c.beginPath();c.arc(el.x,el.y,el.r,0,Math.PI*2);c.fillStyle=el.fill;c.fill()}else if(el.type==='text'){c.font=`${el.style||'normal'} ${el.weight||'400'} ${el.fontSize||el.size||40}px "${el.font}"`;c.textAlign=el.align||'center';c.fillStyle=el.fill;c.fillText(el.text,el.x,el.y)}c.restore()}
function exportSVG(){selectedId=null;render();let s='<svg xmlns="http://www.w3.org/2000/svg" width="'+canvasW+'" height="'+canvasH+'"><rect width="'+canvasW+'" height="'+canvasH+'" fill="'+canvasBg+'"/>';elements.filter(e=>e.visible!==false).forEach(e=>{if(e.type==='rect')s+='<rect x="'+e.x+'" y="'+e.y+'" width="'+e.w+'" height="'+e.h+'" rx="'+(e.rx||0)+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'"/>';else if(e.type==='circle')s+='<circle cx="'+e.x+'" cy="'+e.y+'" r="'+e.r+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'"/>';else if(e.type==='text')s+='<text x="'+e.x+'" y="'+(e.y+(e.fontSize||e.size||40))+'" font-family="'+e.font+'" font-size="'+(e.fontSize||e.size||40)+'" font-weight="'+(e.weight||400)+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'" text-anchor="middle">'+e.text+'</text>'});s+='</svg>';const b=new Blob([s],{type:'image/svg+xml'});const a=document.createElement('a');a.download='logo-rc-maker.svg';a.href=URL.createObjectURL(b);a.click();toast('SVG exporté')}
function exportJPG(){selectedId=null;render();const a=document.createElement('a');a.download='logo-rc-maker.jpg';a.href=canvas.toDataURL('image/jpeg',0.9);a.click();toast('JPG exporté')}

function goHome(){window.location.href='index.html'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();deleteSelected()}if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}if(e.ctrlKey&&e.key==='d'){e.preventDefault();duplicateSelected()}if(e.ctrlKey&&e.key==='s'){e.preventDefault();exportPNG()}});

function addHexagon(){const el={id:mkId(),type:'polygon',x:canvasW/2,y:canvasH/2,size:60,sides:6,fill:'#5b6af0',opacity:1,rotation:0,visible:true,shadow:null,glow:null};elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();showCtx();toast('Hexagone')}
function addDiamond(){const el={id:mkId(),type:'polygon',x:canvasW/2,y:canvasH/2,size:55,sides:4,fill:'#7c4af0',opacity:1,rotation:0,visible:true,shadow:null,glow:null};elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();showCtx();toast('Diamant')}
function addHeart(){const el={id:mkId(),type:'heart',x:canvasW/2,y:canvasH/2,size:80,fill:'#ef4444',opacity:1,rotation:0,visible:true,shadow:null,glow:null};elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();showCtx();toast('Cœur')}

function init(){canvasBg='#0d0d0f';const bg=makeRect(130,130,240,240);bg.rx=14;bg.fill='#5b6af0';const txt=makeText(250,195,'RC');txt.fontSize=90;txt.size=90;txt.weight='900';txt.fill='#ffffff';const sub=makeText(250,295,'LOGO MAKER');sub.fontSize=15;sub.size=15;sub.weight='600';sub.fill='rgba(255,255,255,0.7)';sub.letterSpacing=3;elements=[bg,txt,sub];saveHistory();render();renderProps();renderLayers();renderCanvasSettings();fitToScreen();}
init();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
