<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>RC Logo Maker – Regard Créatif</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="icon" href="https://i.postimg.cc/25xvJ3yg/ezgif-5a59033461dfd07d.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;700;900&family=Bebas+Neue&family=Righteous&family=Oswald:wght@500;700&family=Roboto:wght@400;900&family=League+Spartan:wght@700;900&family=Caveat:wght@700&family=Inter:wght@400;600;700;900&family=Pacifico&family=Abril+Fatface&family=Alfa+Slab+One&family=Lobster&family=Fjalla+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f; --panel: #12121a; --panel2: #16161f; --border: #1e1e2b;
            --text: #e8e8ee; --text2: #8a8a9a; --text3: #555566;
            --accent: #5b6af0; --accent2: #7c4af0; --gold: #d4af37;
            --radius: 10px; --radius-sm: 8px; --safe-bottom: env(safe-area-inset-bottom, 8px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width:100%; height:100%; overflow:hidden; position:fixed; top:0; left:0; }
        body { background:#000; font-family:'DM Sans','Inter',sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
        #splash { position:fixed; top:0;left:0;width:100%;height:100%;z-index:9999;background:#0a0a0f;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center; }
        #splash.hidden { display:none; }
        #particleCanvas { position:absolute;inset:0;width:100%;height:100%; }
        #robotCanvas { position:relative;z-index:2;width:260px;height:320px; }
        #carpetCanvas { position:relative;z-index:2;width:260px;height:160px;margin-top:-20px; }
        #rcLogo { position:absolute;z-index:3;font-family:'Arial Black',sans-serif;font-size:72px;font-weight:900;background:linear-gradient(135deg,#5b6af0,#7c4af0,#5b6af0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;opacity:0;filter:drop-shadow(0 0 20px #5b6af0);pointer-events:none; }
        #subText { font-family:Arial,sans-serif;font-size:16px;font-weight:300;color:#8a9eff;letter-spacing:8px;text-transform:uppercase;opacity:0;margin-top:6px;z-index:3;position:relative; }
        .screen { display:none;height:100%;flex-direction:column;overflow:hidden;color:var(--text);background:var(--bg); }
        .screen.active { display:flex; }
        #ticker-bar { background:#d4af37;color:#000;padding:5px 0;overflow:hidden;white-space:nowrap;font-weight:700;font-size:0.68rem;letter-spacing:1px;text-transform:uppercase;flex-shrink:0; }
        #ticker-bar .ticker-text { display:inline-block;animation:ticker 30s linear infinite; }
        @keyframes ticker { 0%{transform:translateX(100%);} 100%{transform:translateX(-100%);} }
        #home-header { padding:8px 16px 4px;text-align:center;border-bottom:1px solid var(--border);flex-shrink:0; }
        #home-header .app-logo { width:44px;height:44px;border-radius:var(--radius-sm);margin-bottom:2px; }
        #home-header .app-name { font-weight:900;font-size:1.1rem; }
        #home-header .app-name span { color:var(--accent); }
        #home-header .app-subtitle { font-size:0.65rem;color:var(--text2); }
        #download-apk { display:flex;align-items:center;justify-content:center;gap:6px;background:var(--panel2);border:1px solid var(--border);margin:6px 16px;padding:8px;border-radius:25px;color:var(--text);font-weight:600;font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;flex-shrink:0; }
        #home-search { margin:5px 16px;display:flex;align-items:center;background:var(--panel2);border:1px solid var(--border);border-radius:25px;padding:8px 14px;gap:8px;flex-shrink:0; }
        #home-search input { flex:1;background:none;border:none;color:var(--text);font-size:0.8rem;outline:none; }
        #home-content { flex:1;overflow-y:auto;padding:0 14px 10px;-webkit-overflow-scrolling:touch; }
        .section-title { font-weight:700;font-size:0.78rem;margin:10px 0 5px;color:var(--text);display:flex;align-items:center;gap:6px; }
        .template-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:5px; }
        .tpl-card { background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all 0.2s;aspect-ratio:1; }
        .tpl-card:hover { border-color:var(--accent);transform:scale(1.02); }
        .tpl-card .preview { height:70%;display:flex;align-items:center;justify-content:center;padding:6px; }
        .tpl-card .tpl-name { padding:3px;font-size:0.58rem;font-weight:600;color:var(--text2);text-align:center; }
        #home-bottom { display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 8px calc(10px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--panel);flex-shrink:0; }
        .bottom-btn { width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--text2);font-size:0.95rem;transition:all 0.2s; }
        .bottom-btn:hover { border-color:var(--accent);color:var(--text); }
        .bottom-btn.main { width:50px;height:50px;background:var(--accent);color:#fff;border:none;font-size:1.3rem; }
        .bottom-btn.gold { border-color:var(--gold);color:var(--gold); }
        #editor-topbar { height:46px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:100; }
        .brand { font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap; }
        .tb-btn { padding:4px 8px;border-radius:5px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;display:flex;align-items:center;gap:3px;font-family:inherit;white-space:nowrap;transition:all .15s; }
        .tb-btn:hover { background:var(--panel2);color:var(--text);border-color:var(--accent); }
        .tb-btn.primary { background:var(--accent);border-color:var(--accent);color:#fff; }
        .tb-spacer { flex:1; }
        #editor-main { display:flex;flex:1;overflow:hidden; }
        #left-sidebar { width:50px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:4px 0;gap:2px;flex-shrink:0; }
        .tool-btn { width:40px;height:40px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:7px;font-family:inherit;transition:all .15s; }
        .tool-btn:hover { background:var(--panel2);color:var(--text);border-color:var(--border); }
        .tool-btn svg { width:15px;height:15px; }
        .tool-sep { width:24px;height:1px;background:var(--border);margin:2px 0; }
        #panel-flyout { width:0;background:var(--panel2);border-right:1px solid var(--border);overflow:hidden;transition:width .2s;flex-shrink:0; }
        #panel-flyout.open { width:220px; }
        .panel-inner { width:220px;height:100%;overflow-y:auto;padding:10px; }
        .panel-title { font-weight:700;font-size:11px;margin-bottom:8px;text-transform:uppercase; }
        .shape-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:4px; }
        .shape-item { aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s;font-size:20px; }
        .shape-item:hover { border-color:var(--accent);color:var(--accent);background:rgba(91,106,240,0.1); }
        #canvas-area { flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1c1c24;background-image:radial-gradient(circle,#2a2a35 1px,transparent 1px);background-size:20px 20px; }
        #canvas-wrapper { position:relative;transform-origin:center; }
        #main-canvas { display:block;box-shadow:0 8px 60px rgba(0,0,0,0.8);border-radius:2px;cursor:crosshair; }
        #sel-canvas { position:absolute;top:0;left:0;pointer-events:none; }
        #right-sidebar { width:200px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0; }
        .rs-tabs { display:flex;border-bottom:1px solid var(--border); }
        .rs-tab { flex:1;padding:8px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:9px;font-family:inherit;text-transform:uppercase;border-bottom:2px solid transparent; }
        .rs-tab.active { color:var(--accent);border-bottom-color:var(--accent); }
        .rs-body { flex:1;overflow-y:auto;padding:8px; }
        .prop-group { margin-bottom:10px; }
        .prop-label { font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px; }
        .prop-row { display:flex;align-items:center;gap:4px;margin-bottom:4px; }
        .prop-input { flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:10px;min-width:0; }
        .prop-input:focus { outline:none;border-color:var(--accent); }
        .prop-input[type="color"] { padding:2px;height:26px;cursor:pointer;width:34px;flex:0 0 auto; }
        .prop-slider { flex:1;-webkit-appearance:none;height:3px;background:var(--panel2);border-radius:2px;outline:none; }
        .prop-slider::-webkit-slider-thumb { -webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer; }
        .prop-val { min-width:26px;text-align:right;color:var(--text2);font-size:9px; }
        .btn-row { display:flex;gap:3px; }
        .prop-btn { flex:1;padding:4px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:9px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:2px; }
        .prop-btn:hover { background:rgba(91,106,240,0.15);border-color:var(--accent);color:var(--accent); }
        .prop-select { width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 6px;font-family:inherit;font-size:10px;cursor:pointer; }
        .popup-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:500;display:none;align-items:flex-end;justify-content:center; }
        .popup-overlay.active { display:flex; }
        .popup { background:var(--panel);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px 30px;width:100%;max-width:400px;animation:slideUp .3s;position:relative; }
        @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
        .popup h3 { font-size:0.85rem;margin-bottom:10px;text-align:center; }
        .popup .dim-list { display:grid;grid-template-columns:repeat(2,1fr);gap:5px; }
        .popup .dim-item { background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;text-align:center;cursor:pointer;color:var(--text2);font-size:0.68rem;font-weight:600; }
        .popup .dim-item:hover { border-color:var(--accent);color:var(--text); }
        .popup .close-btn { position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer; }
        .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 18px;border-radius:20px;font-weight:600;font-size:0.75rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none; }
        .toast.show { opacity:1; }
        .no-sel { text-align:center;color:var(--text3);padding:20px;font-size:10px; }
        @media (max-width:768px) { #right-sidebar { width:160px; } #panel-flyout.open { width:180px; } .panel-inner { width:180px; } }
    </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash"><canvas id="particleCanvas"></canvas><canvas id="robotCanvas" width="260" height="320"></canvas><canvas id="carpetCanvas" width="260" height="160"></canvas><div style="position:absolute;bottom:140px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center"><div id="rcLogo">RC</div><div id="subText">Logo Maker</div></div></div>

<!-- HOME -->
<div id="home-screen" class="screen">
    <div id="ticker-bar"><span class="ticker-text">🎨 Laissez place à votre créativité, libérez le potentiel &nbsp;&nbsp;&nbsp; ✨ Laissez place à votre créativité, libérez le potentiel</span></div>
    <div id="home-header"><img src="https://i.postimg.cc/25xvJ3yg/ezgif-5a59033461dfd07d.png" class="app-logo"><div class="app-name">RC <span>Logo Maker</span></div><div class="app-subtitle">Créez votre identité en un clin d'œil</div></div>
    <a id="download-apk" href="../app-release.apk"><i class="fa-solid fa-download"></i> Télécharger (APK)</a>
    <div id="home-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Rechercher un style de logo..."></div>
    <div id="home-content"><div class="section-title"><i class="fa-solid fa-fire"></i> Templates tendance</div><div class="template-grid" id="home-templates"></div></div>
    <div id="home-bottom">
        <div class="bottom-btn" onclick="toast('📚 Tutoriel à venir')"><i class="fa-solid fa-book-open"></i></div>
        <div class="bottom-btn" onclick="showMenu()"><i class="fa-solid fa-bars"></i></div>
        <div class="bottom-btn main" onclick="openEditor()"><i class="fa-solid fa-plus"></i></div>
        <div class="bottom-btn" onclick="toast('💾 Travaux à venir')"><i class="fa-solid fa-floppy-disk"></i></div>
        <div class="bottom-btn gold" onclick="toast('👑 RC Pro à venir')"><i class="fa-solid fa-crown"></i></div>
    </div>
</div>

<!-- EDITOR -->
<div id="editor-screen" class="screen">
    <div id="editor-topbar">
        <i class="fa-solid fa-arrow-left tb-btn" onclick="goHome()" style="border:none;font-size:15px;cursor:pointer;color:var(--text2);padding:4px"></i>
        <span class="brand">RC Logo Maker</span>
        <div class="tb-spacer"></div>
        <button class="tb-btn" onclick="undo()">↩</button>
        <button class="tb-btn" onclick="redo()">↪</button>
        <button class="tb-btn" onclick="duplicateSelected()">📋 Dupliquer</button>
        <button class="tb-btn primary" onclick="exportPNG()">📥 Exporter PNG</button>
    </div>
    <div id="editor-main">
        <div id="left-sidebar">
            <button class="tool-btn" onclick="togglePanel('shapes')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg>Formes</button>
            <button class="tool-btn" onclick="togglePanel('text')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h12M10 5v12"/></svg>Texte</button>
            <button class="tool-btn" onclick="togglePanel('icons')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2l2 5h5l-4 3 1 5-4-3-4 3 1-5-4-3h5z"/></svg>Icônes</button>
            <button class="tool-btn" onclick="togglePanel('colors')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg>Coul.</button>
            <div class="tool-sep"></div>
            <button class="tool-btn" onclick="addRect()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="14" height="10" rx="2"/></svg></button>
            <button class="tool-btn" onclick="addCircle()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg></button>
            <button class="tool-btn" onclick="addText('MON LOGO')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5h10M10 5v12"/></svg></button>
            <div class="tool-sep"></div>
            <button class="tool-btn" onclick="deleteSelected()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10"/></svg></button>
        </div>
        <div id="panel-flyout"><div class="panel-inner" id="panel-content"></div></div>
        <div id="canvas-area"><div id="canvas-wrapper"><canvas id="main-canvas" width="500" height="500"></canvas><canvas id="sel-canvas" width="500" height="500"></canvas></div></div>
        <div id="right-sidebar">
            <div class="rs-tabs">
                <button class="rs-tab active" onclick="switchTab('props')">Propriétés</button>
                <button class="rs-tab" onclick="switchTab('layers')">Calques</button>
                <button class="rs-tab" onclick="switchTab('canvas')">Canevas</button>
            </div>
            <div class="rs-body">
                <div class="tab-content active" id="tab-props"></div>
                <div class="tab-content" id="tab-layers"></div>
                <div class="tab-content" id="tab-canvas"></div>
            </div>
        </div>
    </div>
</div>

<div class="popup-overlay" id="menu-popup"><div class="popup"><button class="close-btn" onclick="closeMenu()">✕</button><h3>☰ Menu</h3><div class="dim-list"><div class="dim-item" onclick="closeMenu();toast('📝 Inscription à venir')">📝 S'inscrire</div><div class="dim-item" onclick="closeMenu();toast('⚙️ Paramètres à venir')">⚙️ Paramètres</div><div class="dim-item" onclick="closeMenu();toast('💬 Message envoyé')">💬 Message</div><div class="dim-item" onclick="closeMenu();toast('👑 RC Pro à venir')" style="color:#d4af37">👑 Premium</div></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════ SPLASH ═══════════
(function(){
const splash=document.getElementById('splash');const W=splash.clientWidth,H=splash.clientHeight;
const pCanvas=document.getElementById('particleCanvas');pCanvas.width=W;pCanvas.height=H;const pCtx=pCanvas.getContext('2d');
const particles=Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random()*.7+.3,hue:Math.random()>0.5?230:270}));
function drawParticles(){pCtx.clearRect(0,0,W,H);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;pCtx.beginPath();pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);pCtx.fillStyle=`hsla(${p.hue},80%,70%,${p.a})`;pCtx.fill();});}
const rCanvas=document.getElementById('robotCanvas');const rc=rCanvas.getContext('2d');const cx=130,cy=160;let robotT=0,robotReveal=0;
function drawRobot(t,reveal){rc.clearRect(0,0,260,320);rc.save();rc.globalAlpha=reveal;const float=Math.sin(t*1.5)*3;rc.translate(0,float);const torsoGrad=rc.createLinearGradient(cx-52,0,cx+52,0);torsoGrad.addColorStop(0,'#1a1a2e');torsoGrad.addColorStop(0.3,'#2a2a3e');torsoGrad.addColorStop(0.5,'#3a3a5a');torsoGrad.addColorStop(0.7,'#2a2a3e');torsoGrad.addColorStop(1,'#1a1a2e');rc.fillStyle=torsoGrad;rc.beginPath();rc.roundRect(cx-52,cy-50,104,100,8);rc.fill();rc.strokeStyle='rgba(91,106,240,0.5)';rc.lineWidth=1;rc.stroke();const chestGrad=rc.createLinearGradient(cx-30,cy-30,cx+30,cy+30);chestGrad.addColorStop(0,'#12122a');chestGrad.addColorStop(0.5,'#1e1e40');chestGrad.addColorStop(1,'#0a0a1a');rc.fillStyle=chestGrad;rc.beginPath();rc.roundRect(cx-30,cy-30,60,55,5);rc.fill();const coreG=rc.createRadialGradient(cx,cy-5,0,cx,cy-5,18);const pulse=0.6+Math.sin(t*3)*0.4;coreG.addColorStop(0,`rgba(91,106,240,${pulse})`);coreG.addColorStop(0.4,`rgba(124,74,240,${pulse*0.6})`);coreG.addColorStop(1,'rgba(0,0,0,0)');rc.fillStyle=coreG;rc.beginPath();rc.arc(cx,cy-5,18,0,Math.PI*2);rc.fill();for(let i=0;i<6;i++){const ang=i*Math.PI/3;const hx=cx+Math.cos(ang)*12,hy=(cy-5)+Math.sin(ang)*12;rc.strokeStyle=`rgba(180,190,255,${0.4+pulse*0.3})`;rc.lineWidth=0.8;rc.beginPath();rc.moveTo(cx+Math.cos(ang)*6,(cy-5)+Math.sin(ang)*6);rc.lineTo(hx,hy);rc.stroke();}drawShoulder(rc,cx-62,cy-38,t,-1);drawShoulder(rc,cx+62,cy-38,t,1);drawArm(rc,cx-66,cy-20,t,-1,reveal);drawArm(rc,cx+66,cy-20,t,1,reveal);drawLegs(rc,cx,cy+50,t);drawHead(rc,cx,cy-90,t,reveal);rc.restore();}
function drawShoulder(ctx,x,y,t,side){const g=ctx.createLinearGradient(x-15,y,x+15,y);g.addColorStop(0,'#1a1a35');g.addColorStop(0.5,'#2e2e50');g.addColorStop(1,'#1a1a35');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,20,14,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(91,106,240,0.5)';ctx.lineWidth=0.8;ctx.stroke();ctx.strokeStyle='rgba(124,74,240,0.6)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.stroke();}
function drawArm(ctx,x,y,t,side,reveal){const armFloat=Math.sin(t*1.5+side)*2;const carpetPhase=Math.max(0,Math.min(1,(robotT-1.5)/1.2));const armY=y+armFloat+carpetPhase*40;const armX=x+side*carpetPhase*10;ctx.fillStyle='#16162e';ctx.beginPath();ctx.roundRect(armX-10,armY,20,55,5);ctx.fill();ctx.strokeStyle='rgba(91,106,240,0.3)';ctx.lineWidth=0.6;ctx.stroke();ctx.fillStyle='#1c1c38';ctx.beginPath();ctx.roundRect(armX-8,armY+55,16,40,4);ctx.fill();ctx.fillStyle='#14142c';ctx.beginPath();ctx.roundRect(armX-10,armY+95,20,16,6);ctx.fill();ctx.strokeStyle='rgba(124,74,240,0.5)';ctx.lineWidth=0.7;ctx.stroke();}
function drawLegs(ctx,x,y,t){const lx=[x-24,x+24];lx.forEach((lxv,i)=>{ctx.fillStyle='#16162e';ctx.beginPath();ctx.roundRect(lxv-11,y,22,45,4);ctx.fill();ctx.strokeStyle='rgba(91,106,240,0.3)';ctx.lineWidth=0.7;ctx.stroke();ctx.fillStyle='#141428';ctx.beginPath();ctx.roundRect(lxv-9,y+45,18,40,3);ctx.fill();ctx.fillStyle='#1e1e38';ctx.beginPath();ctx.roundRect(lxv-13,y+83,26,12,4);ctx.fill();ctx.strokeStyle='rgba(124,74,240,0.5)';ctx.lineWidth=0.8;ctx.stroke();});ctx.fillStyle='#1e1e3c';ctx.beginPath();ctx.roundRect(x-35,y,70,14,3);ctx.fill();}
function drawHead(ctx,x,y,t,reveal){const hg=ctx.createLinearGradient(x-35,y-30,x+35,y+30);hg.addColorStop(0,'#1a1a35');hg.addColorStop(0.3,'#2c2c50');hg.addColorStop(0.5,'#383860');hg.addColorStop(0.7,'#2c2c50');hg.addColorStop(1,'#1a1a35');ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(x-35,y-30,70,60,10);ctx.fill();ctx.strokeStyle='rgba(91,106,240,0.7)';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#0a0a20';ctx.beginPath();ctx.roundRect(x-28,y-20,56,30,6);ctx.fill();const ep=0.7+Math.sin(t*2)*0.3;[x-14,x+14].forEach(ex=>{const eg=ctx.createRadialGradient(ex,y-6,0,ex,y-6,10);eg.addColorStop(0,`rgba(91,106,240,${ep})`);eg.addColorStop(0.5,`rgba(124,74,240,${ep*0.8})`);eg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(ex,y-6,11,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,210,255,0.9)';ctx.beginPath();ctx.arc(ex+2,y-8,2,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#202040';ctx.beginPath();ctx.roundRect(x-10,y-33,20,6,2);ctx.fill();}

function drawCarpet(progress){cc.clearRect(0,0,260,160);if(progress<=0)return;const h=progress*160;const cg=cc.createLinearGradient(0,0,260,0);cg.addColorStop(0,'rgba(20,18,50,0.95)');cg.addColorStop(0.5,'rgba(40,35,90,1)');cg.addColorStop(1,'rgba(20,18,50,0.95)');cc.fillStyle=cg;cc.beginPath();cc.roundRect(10,0,240,h,4);cc.fill();cc.strokeStyle='rgba(91,106,240,0.5)';cc.lineWidth=1;cc.beginPath();cc.roundRect(10,0,240,h,4);cc.stroke();}
let startTime=null;const TOTAL=5500;const rcLogo=document.getElementById('rcLogo');const subText=document.getElementById('subText');
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

function animate(ts){if(!startTime)startTime=ts;const elapsed=ts-startTime;robotT=elapsed/1000;const progress=Math.min(elapsed/TOTAL,1);drawParticles();const rReveal=easeOut(Math.min(elapsed/400,1));robotReveal=rReveal;drawRobot(robotT,rReveal);const carpetStart=1800,carpetEnd=3200;carpetReveal=elapsed<carpetStart?0:easeOut(Math.min((elapsed-carpetStart)/(carpetEnd-carpetStart),1));drawCarpet(carpetReveal);const logoStart=2400,logoEnd=3600;if(elapsed>=logoStart){const lp=easeInOut(Math.min((elapsed-logoStart)/(logoEnd-logoStart),1));rcLogo.style.opacity=lp;const gp=0.5+Math.sin(robotT*3)*0.5;rcLogo.style.filter=`drop-shadow(0 0 ${10+gp*15}px rgba(91,106,240,0.8))`;}if(elapsed>=3200){subText.style.opacity=easeOut(Math.min((elapsed-3200)/800,1));}if(progress<1)requestAnimationFrame(animate);else{document.getElementById('splash').classList.add('hidden');document.getElementById('home-screen').classList.add('active');renderHomeTemplates();}}
requestAnimationFrame(animate);

chor="middle" font-size="10" font-family="Arial" font-weight="900" fill="#fff">GEO</text></svg>','<svg viewBox="0 0 60 60" width="30"><path d="M15 45 C15 25 45 25 45 45" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/><circle cx="22" cy="30" r="4" fill="#f59e0b"/></svg>','<svg viewBox="0 0 50 60" width="25"><path d="M25 5 L45 12 L45 30 C45 42 25 55 25 55 C25 55 5 42 5 30 L5 12 Z" fill="#5b6af0"/><text x="25" y="35" text-anchor="middle" font-size="8" font-family="Arial" font-weight="900" fill="#fff">PRO</text></svg>'];document.getElementById('home-templates').innerHTML=names.map((n,i)=>`<div class="tpl-card" onclick="openEditor()"><div class="preview" style="background:${i%2===0?'#fff':'#1a1a2e'}">${previews[i]}</div><div class="tpl-name">${n}</div></div>`).join('');}

const canvas=document.getElementById('main-canvas'),ctx=canvas.getContext('2d');
const selCanvas=document.getElementById('sel-canvas'),selCtx=selCanvas.getContext('2d');
const FONTS=['Montserrat','Playfair Display','Poppins','Bebas Neue','Righteous','Oswald','Roboto','League Spartan','Caveat','Inter','Pacifico','Abril Fatface','Alfa Slab One','Lobster','Fjalla One','DM Sans'];
const COLORS=['#ffffff','#000000','#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#78716c','#5b6af0','#7c4af0','#43e97b','#f0932b','#e11d48'];
const ICONS=['★','♦','♠','♥','♣','◆','▲','▼','●','■','⬟','⬡','⌂','✈','⚡','✦','❋','✿','❀','✺','☀','☁','❄','♺','⚙','✉','☎','⚑','♫','✂','❤','🔥','💎','🎯','🚀','⭐','🌈','🍀','🕊️','🎨'];

let elements=[],selectedId=null,history=[],historyIndex=-1,zoom=1,canvasW=500,canvasH=500,canvasBg='#ffffff',lastId=0;
let dragEl=null,dragOffX=0,dragOffY=0,resizeDir=null,resizeOrig=null,currentPanel=null,activeTab='props';

function mkId(){return++lastId}
function makeRect(x,y,w,h){return{id:mkId(),type:'rect',x,y,w,h,fill:'#5b6af0',stroke:'none',strokeW:0,rx:0,opacity:1,rotation:0,visible:true}}
function makeCircle(x,y,r){return{id:mkId(),type:'circle',x,y,r,fill:'#7c4af0',stroke:'none',strokeW:0,opacity:1,rotation:0,visible:true}}
function makeTriangle(x,y,s){return{id:mkId(),type:'triangle',x,y,size:s,fill:'#43e97b',stroke:'none',strokeW:0,opacity:1,rotation:0,visible:true}}
function makeText(x,y,t){return{id:mkId(),type:'text',x,y,text:t,font:'Montserrat',size:40,weight:'900',style:'normal',fill:'#ffffff',align:'center',opacity:1,rotation:0,visible:true,letterSpacing:0}}
function makeIcon(x,y,c,s){return{id:mkId(),type:'icon',x,y,char:c,size:s||60,fill:'#ffffff',opacity:1,rotation:0,visible:true}}

function saveHistory(){history=history.slice(0,historyIndex+1);history.push(JSON.stringify(elements));historyIndex++;if(history.length>40){history.shift();historyIndex--}}
function undo(){if(historyIndex<=0)return;historyIndex--;elements=JSON.parse(history[historyIndex]);selectedId=null;render();renderProps();renderLayers()}
function redo(){if(historyIndex>=history.length-1)return;historyIndex++;elements=JSON.parse(history[historyIndex]);selectedId=null;render();renderProps();renderLayers()}

function render(){
    ctx.clearRect(0,0,canvasW,canvasH);ctx.fillStyle=canvasBg;ctx.fillRect(0,0,canvasW,canvasH);
    elements.filter(e=>e.visible!==false).forEach(e=>{
        ctx.save();ctx.globalAlpha=e.opacity??1;
        const cx=getCX(e),cy=getCY(e);ctx.translate(cx,cy);if(e.rotation)ctx.rotate(e.rotation*Math.PI/180);ctx.translate(-cx,-cy);
        if(e.type==='rect'){ctx.fillStyle=e.fill;if(e.rx>0){ctx.beginPath();roundRectCtx(ctx,e.x,e.y,e.w,e.h,e.rx);ctx.fill()}else ctx.fillRect(e.x,e.y,e.w,e.h);if(e.stroke!=='none'&&e.strokeW>0){ctx.strokeStyle=e.stroke;ctx.lineWidth=e.strokeW;if(e.rx>0){ctx.beginPath();roundRectCtx(ctx,e.x,e.y,e.w,e.h,e.rx);ctx.stroke()}else ctx.strokeRect(e.x,e.y,e.w,e.h)}}
        else if(e.type==='circle'){ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fillStyle=e.fill;ctx.fill();if(e.stroke!=='none'&&e.strokeW>0){ctx.strokeStyle=e.stroke;ctx.lineWidth=e.strokeW;ctx.stroke()}}
        else if(e.type==='triangle'){const s=e.size;ctx.beginPath();ctx.moveTo(e.x,e.y-s/2);ctx.lineTo(e.x+s/2,e.y+s/2);ctx.lineTo(e.x-s/2,e.y+s/2);ctx.closePath();ctx.fillStyle=e.fill;ctx.fill()}
        else if(e.type==='text'){ctx.font=`${e.style||'normal'} ${e.weight||'400'} ${e.size}px "${e.font}"`;ctx.textAlign=e.align||'center';ctx.textBaseline='top';if(e.letterSpacing)ctx.letterSpacing=e.letterSpacing+'px';ctx.fillStyle=e.fill;ctx.fillText(e.text,e.x,e.y);ctx.letterSpacing='0px'}
        else if(e.type==='icon'){ctx.font=`${e.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=e.fill;ctx.fillText(e.char,e.x,e.y)}
        ctx.restore();
    });
    drawSelection();
}
function roundRectCtx(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath()}
function getCX(el){if(el.type==='rect')return el.x+el.w/2;if(el.type==='circle'||el.type==='triangle'||el.type==='icon')return el.x;if(el.type==='text')return el.x;return el.x||0}
function getCY(el){if(el.type==='rect')return el.y+el.h/2;if(el.type==='circle'||el.type==='triangle'||el.type==='icon')return el.y;if(el.type==='text')return el.y;return el.y||0}
function getBB(el){
    if(el.type==='rect')return{x:el.x,y:el.y,w:el.w,h:el.h};if(el.type==='circle')return{x:el.x-el.r,y:el.y-el.r,w:el.r*2,h:el.r*2};
    if(el.type==='triangle')return{x:el.x-el.size/2,y:el.y-el.size/2,w:el.size,h:el.size};
    if(el.type==='text'){ctx.font=`${el.style||'normal'} ${el.weight||'400'} ${el.size}px "${el.font}"`;const w=ctx.measureText(el.text).width;return{x:el.x-w/2,y:el.y,w,h:el.size}}
    if(el.type==='icon')return{x:el.x-el.size/2,y:el.y-el.size/2,w:el.size,h:el.size};return null;
}
function drawSelection(){
    selCtx.clearRect(0,0,canvasW,canvasH);if(!selectedId)return;const el=elements.find(e=>e.id===selectedId);if(!el)return;const bb=getBB(el);if(!bb)return;
    selCtx.strokeStyle='#5b6af0';selCtx.lineWidth=1.5;selCtx.setLineDash([4,3]);selCtx.strokeRect(bb.x-4,bb.y-4,bb.w+8,bb.h+8);selCtx.setLineDash([]);
    const hx=bb.x-4,hy=bb.y-4,hw=bb.w+8,hh=bb.h+8;
    [[hx,hy],[hx+hw/2,hy],[hx+hw,hy],[hx,hy+hh/2],[hx+hw,hy+hh/2],[hx,hy+hh],[hx+hw/2,hy+hh],[hx+hw,hy+hh]].forEach(([px,py])=>{selCtx.fillStyle='#fff';selCtx.fillRect(px-4,py-4,8,8);selCtx.strokeStyle='#5b6af0';selCtx.lineWidth=1;selCtx.strokeRect(px-4,py-4,8,8)});
}

function getPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom}}

canvas.addEventListener('pointerdown',function(e){e.preventDefault();const pos=getPos(e);
    if(selectedId){const el=elements.find(e2=>e2.id===selectedId);if(el){const bb=getBB(el);if(bb){const hx=bb.x-4,hy=bb.y-4,hw=bb.w+8,hh=bb.h+8;
    const handles=[[hx,hy,'nw'],[hx+hw/2,hy,'n'],[hx+hw,hy,'ne'],[hx,hy+hh/2,'w'],[hx+hw,hy+hh/2,'e'],[hx,hy+hh,'sw'],[hx+hw/2,hy+hh,'s'],[hx+hw,hy+hh,'se']];
    for(const[hpx,hpy,dir]of handles){if(Math.abs(pos.x-hpx)<10&&Math.abs(pos.y-hpy)<10){resizeDir=dir;resizeOrig=JSON.parse(JSON.stringify(el));canvas.setPointerCapture(e.pointerId);return}}}}}
    let hit=null;for(let i=elements.length-1;i>=0;i--){const bb=getBB(elements[i]);if(bb&&pos.x>=bb.x&&pos.x<=bb.x+bb.w&&pos.y>=bb.y&&pos.y<=bb.y+bb.h){hit=elements[i];break}}
    if(hit){selectedId=hit.id;dragEl=hit;dragOffX=pos.x-(hit.x||0);dragOffY=pos.y-(hit.y||0);canvas.setPointerCapture(e.pointerId)}else{selectedId=null;dragEl=null}render();renderProps();renderLayers()});

canvas.addEventListener('pointermove',function(e){if(!dragEl&&!resizeDir)return;e.preventDefault();const pos=getPos(e);
    if(resizeDir){const el=elements.find(e2=>e2.id===selectedId);if(!el)return;const dx=pos.x-getPos(e).x+(pos.x-resizeOrig.x),dy=pos.y-getPos(e).y+(pos.y-resizeOrig.y);requestAnimationFrame(()=>{
        if(el.type==='rect'){if(resizeDir.includes('e'))el.w=Math.max(10,resizeOrig.w+dx);if(resizeDir.includes('s'))el.h=Math.max(10,resizeOrig.h+dy);if(resizeDir.includes('w')){el.x=resizeOrig.x+dx;el.w=Math.max(10,resizeOrig.w-dx)}if(resizeDir.includes('n')){el.y=resizeOrig.y+dy;el.h=Math.max(10,resizeOrig.h-dy)}}
        else if(el.type==='circle'){el.r=Math.max(5,resizeOrig.r+Math.max(Math.abs(dx),Math.abs(dy))*Math.sign(dx+dy))}
        else if(el.type==='triangle'){el.size=Math.max(10,resizeOrig.size+Math.max(Math.abs(dx),Math.abs(dy))*Math.sign(dx+dy))}
        render();renderProps()});return}
    if(dragEl){requestAnimationFrame(()=>{dragEl.x=pos.x-dragOffX;dragEl.y=pos.y-dragOffY;render()})}});

canvas.addEventListener('pointerup',function(){if(dragEl||resizeDir)saveHistory();dragEl=null;resizeDir=null;resizeOrig=null;renderProps()});
canvas.addEventListener('dblclick',function(e){const pos=getPos(e);let hit=null;for(let i=elements.length-1;i>=0;i--){if(elements[i].type==='text'){const bb=getBB(elements[i]);if(bb&&pos.x>=bb.x&&pos.x<=bb.x+bb.w&&pos.y>=bb.y&&pos.y<=bb.y+bb.h){hit=elements[i];break}}}if(hit){const t=prompt('Modifier le texte:',hit.text);if(t!==null){hit.text=t;saveHistory();render();renderProps()}}});

function addRect(){const el=makeRect(canvasW/2-60,canvasH/2-40,120,80);elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();toast('Rectangle ajouté')}
function addCircle(){const el=makeCircle(canvasW/2,canvasH/2,60);elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();toast('Cercle ajouté')}
function addTriangle(){const el=makeTriangle(canvasW/2,canvasH/2,110);elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();toast('Triangle ajouté')}
function addText(t){const el=makeText(canvasW/2,canvasH/2-20,t||'MON LOGO');elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();toast('Texte ajouté')}
function addIcon(c){const el=makeIcon(canvasW/2,canvasH/2,c,70);elements.push(el);selectedId=el.id;saveHistory();render();renderProps();renderLayers();toast('Icône ajoutée')}
function deleteSelected(){if(!selectedId)return;elements=elements.filter(e=>e.id!==selectedId);selectedId=null;saveHistory();render();renderProps();renderLayers();toast('Supprimé')}
function duplicateSelected(){if(!selectedId)return;const el=elements.find(e=>e.id===selectedId);if(!el)return;const copy=JSON.parse(JSON.stringify(el));copy.id=mkId();copy.x+=20;copy.y+=20;elements.push(copy);selectedId=copy.id;saveHistory();render();renderProps();renderLayers();toast('Dupliqué')}

function togglePanel(name){
    const fly=document.getElementById('panel-flyout');
    if(currentPanel===name){fly.classList.remove('open');currentPanel=null}else{currentPanel=name;fly.classList.add('open');renderPanel(name)}
}
function renderPanel(name){
    const c=document.getElementById('panel-content');
    if(name==='shapes')c.innerHTML=`<div class="panel-title">Formes</div><div class="shape-grid">${[{l:'Rectangle',a:'addRect()',i:'⬛'},{l:'Cercle',a:'addCircle()',i:'⭕'},{l:'Triangle',a:'addTriangle()',i:'🔺'}].map(s=>`<div class="shape-item" onclick="${s.a}">${s.i}</div><div style="font-size:8px;text-align:center;color:var(--text2);margin-top:-8px">${s.l}</div>`).join('')}</div>`;
    else if(name==='text')c.innerHTML=`<div class="panel-title">Texte</div><div class="shape-grid">${[{t:'TITRE',s:42,w:'900'},{t:'Sous-titre',s:24,w:'700'},{t:'Corps',s:16,w:'400'},{t:'Slogan',s:13,w:'400'}].map(t=>`<div class="shape-item" onclick="addText('${t.t}')" style="font-family:Montserrat;font-size:${t.s/3}px;font-weight:${t.w};aspect-ratio:auto;padding:8px">${t.t}</div>`).join('')}</div>`;
    else if(name==='icons')c.innerHTML=`<div class="panel-title">Icônes</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">${ICONS.map(ic=>`<div style="aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2)" onclick="addIcon('${ic}')">${ic}</div>`).join('')}</div>`;
    else if(name==='colors')c.innerHTML=`<div class="panel-title">Couleurs</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px">${COLORS.map(cl=>`<div style="aspect-ratio:1;background:${cl};border-radius:4px;cursor:pointer;border:2px solid transparent" onclick="applyColor('${cl}')"></div>`).join('')}</div><div class="prop-label">Personnalisée</div><div class="prop-row"><input type="color" class="prop-input" id="cust-color" value="#5b6af0" style="width:36px;height:28px"><input class="prop-input" id="hex-color" value="#5b6af0" placeholder="#hex"><button class="prop-btn" onclick="applyColor(document.getElementById('hex-color').value)">OK</button></div>`;
}
function applyColor(cl){if(!selectedId){setCanvasBg(cl);return}const el=elements.find(e=>e.id===selectedId);if(!el)return;el.fill=cl;saveHistory();render();renderProps()}
function setCanvasBg(cl){canvasBg=cl;render();saveHistory()}

function renderProps(){
    const c=document.getElementById('tab-props');
    if(!selectedId){c.innerHTML='<div class="no-sel">Sélectionnez un élément</div>';return}
    const el=elements.find(e=>e.id===selectedId);if(!el)return;
    let h='<div class="prop-group"><div class="prop-label">Position</div><div class="prop-row"><input class="prop-input" type="number" value="'+Math.round(el.x)+'" onchange="updateProp(\'x\',+this.value)"><input class="prop-input" type="number" value="'+Math.round(el.y)+'" onchange="updateProp(\'y\',+this.value)"></div></div>';
    if(el.type==='rect')h+='<div class="prop-group"><div class="prop-label">Taille</div><div class="prop-row"><input class="prop-input" type="number" value="'+Math.round(el.w)+'" onchange="updateProp(\'w\',+this.value)"><input class="prop-input" type="number" value="'+Math.round(el.h)+'" onchange="updateProp(\'h\',+this.value)"></div><div class="prop-row"><span style="font-size:9px;color:var(--text3)">Rayon</span><input class="prop-slider" type="range" min="0" max="100" value="'+(el.rx||0)+'" oninput="updateProp(\'rx\',+this.value);this.nextElementSibling.textContent=this.value+\'px\'"><span class="prop-val">'+(el.rx||0)+'px</span></div></div>';
    if(el.type==='circle')h+='<div class="prop-group"><div class="prop-label">Rayon</div><div class="prop-row"><input class="prop-slider" type="range" min="5" max="200" value="'+el.r+'" oninput="updateProp(\'r\',+this.value);this.nextElementSibling.textContent=this.value+\'px\'"><span class="prop-val">'+el.r+'px</span></div></div>';
    if(el.type==='triangle')h+='<div class="prop-group"><div class="prop-label">Taille</div><div class="prop-row"><input class="prop-slider" type="range" min="20" max="300" value="'+(el.size||60)+'" oninput="updateProp(\'size\',+this.value);this.nextElementSibling.textContent=this.value+\'px\'"><span class="prop-val">'+(el.size||60)+'px</span></div></div>';
    h+='<div class="prop-group"><div class="prop-label">Rotation</div><div class="prop-row"><input class="prop-slider" type="range" min="-180" max="180" value="'+(el.rotation||0)+'" oninput="updateProp(\'rotation\',+this.value);this.nextElementSibling.textContent=this.value+\'°\'"><span class="prop-val">'+(el.rotation||0)+'°</span></div></div>';
    h+='<div class="prop-group"><div class="prop-label">Opacité</div><div class="prop-row"><input class="prop-slider" type="range" min="0" max="1" step="0.01" value="'+(el.opacity??1)+'" oninput="updateProp(\'opacity\',+this.value);this.nextElementSibling.textContent=Math.round(this.value*100)+\'%\'"><span class="prop-val">'+Math.round((el.opacity??1)*100)+'%</span></div></div>';
    if(el.type==='text')h+='<div class="prop-group"><div class="prop-label">Texte</div><div class="prop-row"><textarea class="prop-input" rows="2" onchange="updateProp(\'text\',this.value)" style="resize:vertical">'+el.text+'</textarea></div><div class="prop-row"><select class="prop-select" onchange="updateProp(\'font\',this.value)">'+FONTS.map(f=>`<option value="${f}" ${el.font===f?'selected':''}>${f}</option>`).join('')+'</select></div><div class="prop-row"><input class="prop-input" type="number" value="'+el.size+'" onchange="updateProp(\'size\',+this.value)" placeholder="Taille"><select class="prop-select" onchange="updateProp(\'weight\',this.value)"><option value="400" '+(el.weight==='400'?'selected':'')+'>Normal</option><option value="700" '+(el.weight==='700'?'selected':'')+'>Gras</option><option value="900" '+(el.weight==='900'?'selected':'')+'>Black</option></select></div></div>';
    if(el.type!=='text')h+='<div class="prop-group"><div class="prop-label">Couleur</div><div class="prop-row"><input type="color" class="prop-input" value="'+(el.fill||'#5b6af0')+'" oninput="updateProp(\'fill\',this.value)" style="width:36px;height:28px"><input class="prop-input" value="'+(el.fill||'#5b6af0')+'" onchange="updateProp(\'fill\',this.value)"></div></div>';
    else h+='<div class="prop-group"><div class="prop-label">Couleur</div><div class="prop-row"><input type="color" class="prop-input" value="'+(el.fill||'#ffffff')+'" oninput="updateProp(\'fill\',this.value)" style="width:36px;height:28px"><input class="prop-input" value="'+(el.fill||'#ffffff')+'" onchange="updateProp(\'fill\',this.value)"></div></div>';
    h+='<div class="prop-group"><div class="btn-row"><button class="prop-btn" onclick="duplicateSelected()">📋 Dupliquer</button><button class="prop-btn" onclick="deleteSelected()" style="color:#ef4444">🗑️ Supprimer</button></div></div>';
    c.innerHTML=h;
}
function updateProp(k,v){if(!selectedId)return;const el=elements.find(e=>e.id===selectedId);if(!el)return;el[k]=v;render();clearTimeout(window._pt);window._pt=setTimeout(()=>saveHistory(),400)}

function renderLayers(){
    const c=document.getElementById('tab-layers');
    if(elements.length===0){c.innerHTML='<div class="no-sel">Aucun calque</div>';return}
    c.innerHTML='<div style="font-weight:700;font-size:10px;margin-bottom:6px">'+elements.length+' éléments</div><div style="display:flex;flex-direction:column;gap:2px">'+[...elements].reverse().map(el=>'<div style="display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:5px;background:var(--panel2);border:1px solid '+(el.id===selectedId?'var(--accent)':'var(--border)')+';cursor:pointer;font-size:10px" onclick="selectLayer('+el.id+')"><span style="width:20px;height:20px;border-radius:3px;background:'+(el.fill||'#444')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff">'+(el.type==='text'?'T':el.type==='circle'?'●':el.type==='icon'?el.char:'■')+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(el.type==='text'?el.text.substring(0,15):el.type)+'</span><span onclick="event.stopPropagation();elements=elements.filter(e=>e.id!=='+el.id+');if(selectedId==='+el.id+')selectedId=null;saveHistory();render();renderProps();renderLayers()" style="cursor:pointer;color:var(--text3);font-size:10px">✕</span></div>').join('')+'</div>';
}
function selectLayer(id){selectedId=id;render();renderProps();renderLayers()}

function renderCanvasSettings(){
    const c=document.getElementById('tab-canvas');
    c.innerHTML='<div class="prop-group"><div class="prop-label">Taille</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">'+SIZES.map(s=>`<div class="prop-btn" style="padding:6px;text-align:center;'+(canvasW===s[0]&&canvasH===s[1]?'background:rgba(91,106,240,0.2);border-color:var(--accent)':'')+'" onclick="resizeCanvas(${s[0]},${s[1]})">${s[2]}<br><small style="color:var(--text3)">${s[0]}x${s[1]}</small></div>`).join('')+'</div><div class="prop-row"><input class="prop-input" id="cw-inp" type="number" value="'+canvasW+'" min="100" max="2000"><input class="prop-input" id="ch-inp" type="number" value="'+canvasH+'" min="100" max="2000"><button class="prop-btn" onclick="resizeCanvas(+document.getElementById(\'cw-inp\').value,+document.getElementById(\'ch-inp\').value)">OK</button></div></div><div class="prop-group"><div class="prop-label">Fond</div><div class="prop-row"><input type="color" class="prop-input" value="'+canvasBg+'" onchange="setCanvasBg(this.value);renderCanvasSettings()" style="width:36px;height:28px"><input class="prop-input" value="'+canvasBg+'" onchange="setCanvasBg(this.value);renderCanvasSettings()"></div></div><div class="prop-group"><div class="prop-label">Export</div><div class="btn-row"><button class="prop-btn" onclick="exportPNG()">PNG</button><button class="prop-btn" onclick="exportPNG2x()">PNG @2x</button><button class="prop-btn" onclick="exportSVG()">SVG</button></div></div>';
}
function resizeCanvas(w,h){canvasW=w;canvasH=h;canvas.width=w;canvas.height=h;selCanvas.width=w;selCanvas.height=h;render();renderCanvasSettings();fitToScreen();toast('Canevas: '+w+'x'+h+'px')}
function switchTab(name){
    activeTab=name;document.querySelectorAll('.rs-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+name)?.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>{t.style.display='none';t.classList.remove('active')});
    const tc=document.getElementById('tab-'+name);if(tc){tc.style.display='block';tc.classList.add('active')}
    if(name==='layers')renderLayers();if(name==='canvas')renderCanvasSettings();if(name==='props')renderProps();
}

function changeZoom(d){zoom=Math.max(0.2,Math.min(3,zoom+d));document.getElementById('canvas-wrapper').style.transform='scale('+zoom+')'}
function fitToScreen(){const a=document.getElementById('canvas-area');zoom=Math.min((a.clientWidth-40)/canvasW,(a.clientHeight-40)/canvasH,2);document.getElementById('canvas-wrapper').style.transform='scale('+zoom+')'}
document.getElementById('canvas-area').addEventListener('wheel',function(e){if(e.ctrlKey){e.preventDefault();changeZoom(e.deltaY<0?0.05:-0.05)}},{passive:false});

function exportPNG(){selectedId=null;render();const a=document.createElement('a');a.download='logo-rc-maker.png';a.href=canvas.toDataURL('image/png');a.click();toast('PNG exporté')}
function exportPNG2x(){selectedId=null;render();const c2=document.createElement('canvas');c2.width=canvasW*2;c2.height=canvasH*2;const c2ctx=c2.getContext('2d');c2ctx.scale(2,2);c2ctx.fillStyle=canvasBg;c2ctx.fillRect(0,0,canvasW,canvasH);elements.filter(e=>e.visible!==false).forEach(e=>drawElement(c2ctx,e));const a=document.createElement('a');a.download='logo-rc-maker@2x.png';a.href=c2.toDataURL('image/png');a.click();toast('PNG @2x exporté')}
function drawElement(c,el){c.save();c.globalAlpha=el.opacity??1;if(el.type==='rect'){c.fillStyle=el.fill;if(el.rx>0){c.beginPath();roundRectCtx(c,el.x,el.y,el.w,el.h,el.rx);c.fill()}else c.fillRect(el.x,el.y,el.w,el.h)}else if(el.type==='circle'){c.beginPath();c.arc(el.x,el.y,el.r,0,Math.PI*2);c.fillStyle=el.fill;c.fill()}else if(el.type==='text'){c.font=`${el.style||'normal'} ${el.weight||'400'} ${el.size}px "${el.font}"`;c.textAlign=el.align||'center';c.fillStyle=el.fill;c.fillText(el.text,el.x,el.y)}c.restore()}
function exportSVG(){selectedId=null;render();let s='<svg xmlns="http://www.w3.org/2000/svg" width="'+canvasW+'" height="'+canvasH+'"><rect width="'+canvasW+'" height="'+canvasH+'" fill="'+canvasBg+'"/>';elements.filter(e=>e.visible!==false).forEach(e=>{if(e.type==='rect')s+='<rect x="'+e.x+'" y="'+e.y+'" width="'+e.w+'" height="'+e.h+'" rx="'+(e.rx||0)+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'"/>';else if(e.type==='circle')s+='<circle cx="'+e.x+'" cy="'+e.y+'" r="'+e.r+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'"/>';else if(e.type==='text')s+='<text x="'+e.x+'" y="'+(e.y+e.size)+'" font-family="'+e.font+'" font-size="'+e.size+'" font-weight="'+(e.weight||400)+'" fill="'+e.fill+'" opacity="'+(e.opacity??1)+'" text-anchor="middle">'+e.text+'</text>'});s+='</svg>';const b=new Blob([s],{type:'image/svg+xml'});const a=document.createElement('a');a.download='logo-rc-maker.svg';a.href=URL.createObjectURL(b);a.click();toast('SVG exporté')}

document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();deleteSelected()}if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}if(e.ctrlKey&&e.key==='d'){e.preventDefault();duplicateSelected()}if(e.ctrlKey&&e.key==='s'){e.preventDefault();exportPNG()}});

function init(){
    canvasBg='#0d0d0f';
    const bg=makeRect(130,130,240,240);bg.rx=14;bg.fill='#5b6af0';
    const txt=makeText(250,195,'RC');txt.size=90;txt.weight='900';txt.fill='#ffffff';
    const sub=makeText(250,295,'LOGO MAKER');sub.size=15;sub.weight='600';sub.fill='rgba(255,255,255,0.7)';sub.letterSpacing=3;
    elements=[bg,txt,sub];saveHistory();render();renderProps();renderLayers();renderCanvasSettings();fitToScreen();
}
init();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
