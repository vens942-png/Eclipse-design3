<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RC Logo Maker – Regard Créatif</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="icon" href="https://i.postimg.cc/MH5vhHcM/Picsart-26-05-29-19-07-33-506.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700;900&family=Bebas+Neue&family=Righteous&family=Oswald:wght@500;700&family=Roboto:wght@400;900&family=League+Spartan:wght@600;800;900&family=Caveat:wght@700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #12121a;
            --panel2: #16161f;
            --border: #1e1e2b;
            --text: #e8e8ee;
            --text2: #8a8a9a;
            --accent: #5b6af0;
            --accent2: #7c4af0;
            --accent-light: #818cf8;
            --danger: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* SIDEBAR */
        #sidebar {
            width: 240px; background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 10; flex-shrink: 0;
        }
        #sidebar-logo {
            padding: 18px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        #sidebar-logo .logo-icon {
            width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1rem; overflow: hidden;
        }
        #sidebar-logo .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        #sidebar-logo span { font-weight: 700; font-size: 0.95rem; color: var(--text); }
        #sidebar-logo span em { font-style: normal; color: var(--accent-light); }
        #sidebar-nav { flex: 1; padding: 10px 12px; overflow-y: auto; }
        .nav-section { margin-bottom: 18px; }
        .nav-section-title {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--text2); margin-bottom: 8px; padding-left: 6px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 9px 12px;
            border-radius: var(--radius-sm); cursor: pointer; color: var(--text2);
            transition: all 0.15s; font-size: 0.82rem; font-weight: 500;
        }
        .nav-item:hover { background: var(--panel2); color: var(--text); }
        .nav-item.active { background: rgba(91,106,240,0.12); color: var(--accent-light); }
        .nav-item i { width: 18px; text-align: center; font-size: 0.9rem; }
        #sidebar-footer {
            padding: 12px; border-top: 1px solid var(--border);
            font-size: 0.7rem; color: var(--text2); text-align: center;
        }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; }

        /* TOPBAR */
        #topbar {
            height: 54px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 12px;
        }
        #topbar .btn {
            height: 34px; padding: 0 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--panel2); color: var(--text); cursor: pointer; font-size: 0.78rem;
            font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.15s;
            white-space: nowrap;
        }
        #topbar .btn:hover { border-color: var(--accent); background: rgba(91,106,240,0.08); }
        #topbar .btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
            border: none; font-weight: 700;
        }
        #topbar .btn.primary:hover { opacity: 0.9; }
        #topbar .spacer { flex: 1; }
        #topbar .project-name { font-weight: 600; font-size: 0.85rem; color: var(--text); }

        /* CANVAS AREA */
        #canvas-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #0c0c14; padding: 30px; overflow: auto;
            background-image: radial-gradient(circle, #1a1a24 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #canvas-wrap {
            box-shadow: var(--shadow); border-radius: 4px; overflow: hidden;
        }

        /* BOTTOM BAR */
        #bottom-bar {
            height: 56px; background: var(--panel); border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 8px; overflow-x: auto;
        }
        #bottom-bar .tpl-btn {
            flex: 0 0 auto; width: 44px; height: 44px; border-radius: var(--radius-sm);
            background: var(--panel2); border: 2px solid transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: all 0.15s; color: var(--text2);
        }
        #bottom-bar .tpl-btn:hover { border-color: var(--accent); color: var(--text); }
        #bottom-bar .tpl-label {
            flex: 0 0 auto; font-size: 0.65rem; color: var(--text2); text-transform: uppercase;
            letter-spacing: 1.5px; margin-right: 8px;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 20px;
            font-weight: 600; font-size: 0.8rem; z-index: 999; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }

        @media (max-width: 768px) {
            #sidebar { width: 60px; }
            #sidebar-logo span, .nav-section-title, .nav-item span:not(.sr-only), #sidebar-footer { display: none; }
            .nav-item { justify-content: center; padding: 10px; }
            #topbar .project-name { display: none; }
            #topbar .btn { padding: 0 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <div id="sidebar-logo">
        <div class="logo-icon"><img src="https://i.postimg.cc/MH5vhHcM/Picsart-26-05-29-19-07-33-506.jpg" alt="RC"></div>
        <span>Logo <em>Maker</em></span>
    </div>
    <div id="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">Conception</div>
            <div class="nav-item active" onclick="toast('📄 10 modèles disponibles en bas')"><i class="fa-solid fa-swatchbook"></i> Modèles</div>
            <div class="nav-item" onclick="showElements()"><i class="fa-solid fa-shapes"></i> Éléments</div>
            <div class="nav-item" onclick="addText()"><i class="fa-solid fa-font"></i> Texte</div>
            <div class="nav-item" onclick="addUpload()"><i class="fa-solid fa-upload"></i> Upload</div>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Outils</div>
            <div class="nav-item" onclick="canvas.backgroundColor='#ffffff';canvas.renderAll();toast('⬜ Fond blanc')"><i class="fa-solid fa-fill-drip"></i> Fond blanc</div>
            <div class="nav-item" onclick="canvas.backgroundColor='#0a0a0f';canvas.renderAll();toast('⬛ Fond sombre')"><i class="fa-solid fa-moon"></i> Fond sombre</div>
            <div class="nav-item" onclick="canvas.backgroundColor='transparent';canvas.renderAll();toast('🫥 Fond transparent')"><i class="fa-solid fa-eraser"></i> Fond transparent</div>
        </div>
    </div>
    <div id="sidebar-footer">Regard Créatif © 2026</div>
</div>

<!-- MAIN -->
<div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
        <span class="project-name">Sans titre</span>
        <div class="spacer"></div>
        <button class="btn" onclick="undo()"><i class="fa-solid fa-rotate-left"></i> <span>Annuler</span></button>
        <button class="btn" onclick="redo()"><i class="fa-solid fa-rotate-right"></i> <span>Refaire</span></button>
        <button class="btn primary" onclick="downloadLogo()"><i class="fa-solid fa-download"></i> Télécharger</button>
    </div>

    <!-- CANVAS -->
    <div id="canvas-area">
        <div id="canvas-wrap">
            <canvas id="logoCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <!-- BOTTOM BAR (TEMPLATES) -->
    <div id="bottom-bar">
        <span class="tpl-label">Modèles</span>
        <div class="tpl-btn" onclick="loadTemplate('minimal')" title="Minimal">🔤</div>
        <div class="tpl-btn" onclick="loadTemplate('circle')" title="Cercle">⭕</div>
        <div class="tpl-btn" onclick="loadTemplate('bold')" title="Bold">💪</div>
        <div class="tpl-btn" onclick="loadTemplate('tech')" title="Tech">🤖</div>
        <div class="tpl-btn" onclick="loadTemplate('luxe')" title="Luxe">👑</div>
        <div class="tpl-btn" onclick="loadTemplate('nature')" title="Nature">🌿</div>
        <div class="tpl-btn" onclick="loadTemplate('monogram')" title="Monogram">🅱️</div>
        <div class="tpl-btn" onclick="loadTemplate('geometric')" title="Géométrique">🔷</div>
        <div class="tpl-btn" onclick="loadTemplate('vintage')" title="Vintage">📻</div>
        <div class="tpl-btn" onclick="loadTemplate('neon')" title="Néon">💡</div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script>
    // Canvas setup
    const canvas = new fabric.Canvas('logoCanvas', {
        backgroundColor: '#ffffff', width: 500, height: 500,
        preserveObjectStacking: true
    });

    // Undo/Redo
    let history = [];
    let historyIndex = -1;
    function saveState() {
        history = history.slice(0, historyIndex + 1);
        history.push(JSON.stringify(canvas.toJSON()));
        historyIndex = history.length - 1;
    }
    function undo() {
        if (historyIndex > 0) { historyIndex--; canvas.loadFromJSON(JSON.parse(history[historyIndex]), canvas.renderAll.bind(canvas)); toast('↩️ Annulé'); }
    }
    function redo() {
        if (historyIndex < history.length - 1) { historyIndex++; canvas.loadFromJSON(JSON.parse(history[historyIndex]), canvas.renderAll.bind(canvas)); toast('↪️ Rétabli'); }
    }
    canvas.on('object:modified', saveState);
    canvas.on('object:added', saveState);
    saveState();

    // Toast
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
    }

    // Show elements panel
    function showElements() {
        const btns = [
            { label: 'Texte', action: addText },
            { label: 'Cercle', action: addCircle },
            { label: 'Carré', action: addRect },
            { label: 'Triangle', action: addTriangle },
            { label: 'Étoile', action: addStar },
            { label: 'Cœur', action: addHeart },
            { label: 'Hexagone', action: addHexagon },
            { label: 'Supprimer', action: deleteSelected },
            { label: 'Tout effacer', action: clearAll }
        ];
        const msg = btns.map(b => b.label).join(' | ');
        toast('📐 ' + msg);
        // Auto-add text for quick access
        addText();
    }

    function addUpload() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                fabric.Image.fromURL(ev.target.result, (img) => {
                    img.scaleToWidth(200);
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    toast('📷 Image ajoutée');
                    saveState();
                });
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    // Add text
    function addText() {
        const text = new fabric.Textbox('Votre texte', {
            left: 120, top: 210, width: 260, fontSize: 42,
            fontFamily: 'Montserrat', fontWeight: '900',
            fill: '#1a1a2e', textAlign: 'center'
        });
        canvas.add(text); canvas.setActiveObject(text);
        toast('✏️ Texte ajouté');
    }

    // Add circle
    function addCircle() {
        const c = new fabric.Circle({ left: 180, top: 180, radius: 80, fill: '#5b6af0' });
        canvas.add(c); canvas.setActiveObject(c);
        toast('⭕ Cercle ajouté');
    }

    // Add rect
    function addRect() {
        const r = new fabric.Rect({ left: 150, top: 150, width: 200, height: 200, fill: '#5b6af0' });
        canvas.add(r); canvas.setActiveObject(r);
        toast('⬛ Carré ajouté');
    }

    // Add triangle
    function addTriangle() {
        const t = new fabric.Triangle({ left: 175, top: 140, width: 150, height: 200, fill: '#5b6af0' });
        canvas.add(t); canvas.setActiveObject(t);
        toast('🔺 Triangle ajouté');
    }

    // Add star
    function addStar() {
        const pts = [];
        for (let i = 0; i < 10; i++) {
            const a = (i * Math.PI) / 5 - Math.PI / 2;
            const r = i % 2 === 0 ? 80 : 35;
            pts.push({ x: 250 + r * Math.cos(a), y: 250 + r * Math.sin(a) });
        }
        const s = new fabric.Polygon(pts, { fill: '#f59e0b' });
        canvas.add(s); canvas.setActiveObject(s);
        toast('⭐ Étoile ajoutée');
    }

    // Add heart
    function addHeart() {
        const path = new fabric.Path('M250 350 C100 220 50 120 150 60 C200 30 250 80 250 120 C250 80 300 30 350 60 C450 120 400 220 250 350 Z', { fill: '#ef4444' });
        canvas.add(path); canvas.setActiveObject(path);
        toast('❤️ Cœur ajouté');
    }

    // Add hexagon
    function addHexagon() {
        const pts = [];
        for (let i = 0; i < 6; i++) {
            const a = (i * Math.PI) / 3 - Math.PI / 2;
            pts.push({ x: 250 + 90 * Math.cos(a), y: 250 + 90 * Math.sin(a) });
        }
        const h = new fabric.Polygon(pts, { fill: '#5b6af0' });
        canvas.add(h); canvas.setActiveObject(h);
        toast('🔷 Hexagone ajouté');
    }

    // Delete
    function deleteSelected() {
        const a = canvas.getActiveObject();
        if (a) { canvas.remove(a); toast('🗑️ Supprimé'); }
    }

    // Clear
    function clearAll() {
        canvas.clear(); canvas.backgroundColor = '#ffffff';
        toast('🔄 Toile effacée');
        saveState();
    }

    // Download
    function downloadLogo() {
        const link = document.createElement('a');
        link.download = 'logo-rc-maker.png';
        link.href = canvas.toDataURL({ format: 'png', quality: 1 });
        link.click();
        toast('📥 Logo téléchargé !');
    }

    // Templates
    function loadTemplate(type) {
        clearAll();
        const c = '#5b6af0';
        if (type === 'minimal') {
            const t = new fabric.Textbox('MARQUE', { left:80, top:200, width:340, fontSize:55, fontFamily:'Montserrat', fontWeight:'900', fill:'#1a1a2e', letterSpacing:6, textAlign:'center' });
            const l = new fabric.Rect({ left:170, top:265, width:160, height:3, fill:c });
            canvas.add(t); canvas.add(l);
        } else if (type === 'circle') {
            const ci = new fabric.Circle({ left:165, top:165, radius:85, fill:c });
            const ti = new fabric.Textbox('M', { left:170, top:195, width:160, fontSize:70, fontFamily:'Playfair Display', fontWeight:'900', fill:'#fff', textAlign:'center' });
            canvas.add(ci); canvas.add(ti);
        } else if (type === 'bold') {
            const r = new fabric.Rect({ left:110, top:150, width:280, height:200, fill:'#1a1a2e' });
            const t = new fabric.Textbox('BOLD', { left:120, top:210, width:260, fontSize:55, fontFamily:'Bebas Neue', fill:c, textAlign:'center', letterSpacing:4 });
            canvas.add(r); canvas.add(t);
        } else if (type === 'tech') {
            const ci = new fabric.Circle({ left:190, top:190, radius:60, fill:'none', stroke:c, strokeWidth:5 });
            const t = new fabric.Textbox('TECH', { left:100, top:270, width:300, fontSize:38, fontFamily:'Oswald', fontWeight:'700', fill:c, textAlign:'center', letterSpacing:6 });
            canvas.add(ci); canvas.add(t);
        } else if (type === 'luxe') {
            const t = new fabric.Textbox('LUXE', { left:80, top:195, width:340, fontSize:60, fontFamily:'Playfair Display', fontStyle:'italic', fontWeight:'900', fill:'#1a1a2e', textAlign:'center' });
            const l1 = new fabric.Rect({ left:130, top:175, width:240, height:1.5, fill:'#d4af37' });
            const l2 = new fabric.Rect({ left:130, top:268, width:240, height:1.5, fill:'#d4af37' });
            canvas.add(l1); canvas.add(t); canvas.add(l2);
        } else if (type === 'nature') {
            const ci = new fabric.Circle({ left:180, top:180, radius:70, fill:'#10b981' });
            const t = new fabric.Textbox('NATURE', { left:100, top:270, width:300, fontSize:32, fontFamily:'Montserrat', fontWeight:'700', fill:'#064e3b', textAlign:'center', letterSpacing:4 });
            canvas.add(ci); canvas.add(t);
        } else if (type === 'monogram') {
            const r = new fabric.Rect({ left:130, top:130, width:240, height:240, rx:20, fill:'#1a1a2e' });
            const t = new fabric.Textbox('AB', { left:140, top:190, width:220, fontSize:80, fontFamily:'Playfair Display', fontWeight:'900', fill:c, textAlign:'center' });
            canvas.add(r); canvas.add(t);
        } else if (type === 'geometric') {
            const pts = [];
            for (let i=0;i<6;i++) { const a=(i*Math.PI)/3-Math.PI/2; pts.push({x:250+90*Math.cos(a),y:250+90*Math.sin(a)}); }
            const h = new fabric.Polygon(pts, { fill:c, opacity:0.8 });
            const t = new fabric.Textbox('GEO', { left:120, top:215, width:260, fontSize:48, fontFamily:'League Spartan', fontWeight:'900', fill:'#fff', textAlign:'center' });
            canvas.add(h); canvas.add(t);
        } else if (type === 'vintage') {
            const t = new fabric.Textbox('VINTAGE', { left:70, top:190, width:360, fontSize:48, fontFamily:'Oswald', fontWeight:'700', fill:'#5c3d2e', textAlign:'center', letterSpacing:8 });
            const l1 = new fabric.Rect({ left:130, top:170, width:240, height:2, fill:'#c49a6c' });
            const l2 = new fabric.Rect({ left:130, top:250, width:240, height:2, fill:'#c49a6c' });
            canvas.add(l1); canvas.add(t); canvas.add(l2);
        } else if (type === 'neon') {
            canvas.backgroundColor = '#0a0a0f';
            const t = new fabric.Textbox('NEON', { left:80, top:190, width:340, fontSize:60, fontFamily:'Righteous', fill:'#ec4899', textAlign:'center', stroke:'#f472b6', strokeWidth:1 });
            const l = new fabric.Rect({ left:150, top:260, width:200, height:3, fill:'#06b6d4' });
            canvas.add(t); canvas.add(l);
        }
        toast('📄 Modèle chargé');
        saveState();
    }

    // Key shortcuts
    document.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); downloadLogo(); }
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // Init
    toast('✨ RC Logo Maker prêt');
</script>

</body>
</html>
